<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตารางบันทึกทะเบียนรถ — ThaiDrill</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --accent:       #E53935;
    --accent-dark:  #C62828;
    --accent-light: #FFEBEE;
    --accent-mid:   #FFCDD2;
    --bg:           #f0f2f5;
    --card:         #ffffff;
    --text:         #000000;
    --sub:          #999;
    --border:       #f0e0e0;
    --row-hover:    #FFF5F5;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 24px 20px;
    color: var(--text);
  }

  .table-card {
    background: var(--card);
    border-radius: 20px;
    box-shadow: 0 8px 40px rgba(229,57,53,0.10), 0 2px 8px rgba(0,0,0,0.04);
    overflow: hidden;
    width: 100%;
  }

  /* HEADER */
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 26px;
    border-bottom: 1.5px solid var(--border);
    flex-wrap: wrap; gap: 12px;
  }
  .title-group { display: flex; align-items: center; gap: 12px; }
  .title-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 17px;
    box-shadow: 0 4px 14px rgba(229,57,53,0.35);
    flex-shrink: 0;
  }
  .title-text { font-size: 16px; font-weight: 800; color: var(--text); }
  .title-sub  { font-size: 11.5px; color: var(--sub); font-weight: 500; margin-top: 1px; }

  .header-controls { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }

  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--accent-light);
    border: 1.5px solid var(--accent-mid);
    border-radius: 11px; padding: 8px 13px;
    transition: all 0.25s;
  }
  .search-box:focus-within { border-color: #000; box-shadow: 0 0 0 3px rgba(229,57,53,0.13); }
  .search-box i { color: var(--sub); font-size: 12px; }
  .search-box input {
    background: none; border: none; outline: none;
    font-size: 13px; font-family: 'Nunito', sans-serif;
    color: var(--text); width: 180px;
  }
  .search-box input::placeholder { color: #ccc; }

  .btn-add {
    display: flex; align-items: center; gap: 7px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    color: #fff; border: none; outline: none;
    border-radius: 11px; padding: 9px 16px;
    font-size: 13px; font-weight: 700;
    font-family: 'Nunito', sans-serif;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(229,57,53,0.30);
    transition: transform 0.18s, box-shadow 0.18s;
    white-space: nowrap;
  }
  .btn-add:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(229,57,53,0.42); }

  .btn-export {
    display: flex; align-items: center; gap: 7px;
    background: #f5f5f5; color: var(--sub);
    border: 1.5px solid #e8e8e8; outline: none;
    border-radius: 11px; padding: 8px 14px;
    font-size: 13px; font-weight: 600;
    font-family: 'Nunito', sans-serif;
    cursor: pointer; white-space: nowrap;
    transition: all 0.18s;
  }
  .btn-export:hover { background: var(--accent-light); border-color: var(--accent-mid); color: var(--accent); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 680px; }

  thead tr th {
    padding: 13px 18px;
    font-size: 13px; font-weight: 800; color: #000;
    background: var(--accent-light);
    border-bottom: 2px solid var(--accent-mid);
    white-space: nowrap; text-align: left; vertical-align: middle;
  }
  thead tr th:first-child { padding-left: 26px; }
  thead tr th:last-child  { padding-right: 26px; }

  tbody tr { transition: background 0.15s; animation: fadeRow 0.35s ease both; }
  @keyframes fadeRow {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  tbody tr:hover { background: var(--row-hover); }

  tbody tr td {
    padding: 13px 18px;
    font-size: 13px; color: #000;
    border-bottom: 1px solid #f5eded;
    vertical-align: middle; white-space: nowrap; text-align: left;
  }
  tbody tr td:first-child { padding-left: 26px; }
  tbody tr td:last-child  { padding-right: 26px; }
  tbody tr:last-child td  { border-bottom: none; }

  .row-num {
    width: 28px; height: 28px; border-radius: 8px;
    background: var(--accent-light); color: #000;
    font-size: 11.5px; font-weight: 800;
    display: flex; align-items: center; justify-content: center;
  }
  .contractor-chip { display: inline-flex; align-items: center; gap: 6px; color: #000; font-size: 13px; font-weight: 700; }
  .type-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 700; color: #000; }
  .id-code {
    font-family: 'Courier New', monospace;
    font-size: 13px; font-weight: 700;
    color: var(--accent-dark);
    background: var(--accent-light);
    padding: 3px 9px; border-radius: 6px;
    letter-spacing: 0.05em;
  }
  .maker-group { display: flex; align-items: center; gap: 9px; }
  .maker-dot {
    width: 30px; height: 30px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .mk-blue   { background: linear-gradient(135deg, #1e88e5, #1565c0); }
  .mk-red    { background: linear-gradient(135deg, #e53935, #c62828); }
  .mk-dark   { background: linear-gradient(135deg, #424242, #212121); }
  .mk-green  { background: linear-gradient(135deg, #43a047, #2e7d32); }
  .mk-orange { background: linear-gradient(135deg, #fb8c00, #e65100); }
  .maker-name { font-size: 13px; font-weight: 700; color: #000; }
  .model-text { font-size: 13px; font-weight: 600; color: #000; }

  .action-group { display: flex; align-items: center; gap: 8px; }
  .act-btn {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; border: none; cursor: pointer;
    transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
  }
  .act-edit   { background: linear-gradient(135deg,#fff3e0,#ffe0b2); color:#e65100; box-shadow:0 2px 8px rgba(230,81,0,0.18); }
  .act-delete { background: linear-gradient(135deg,#ffebee,#ffcdd2); color:#c62828; box-shadow:0 2px 8px rgba(198,40,40,0.18); }
  .act-btn:hover { transform: translateY(-2px) scale(1.12); box-shadow: 0 6px 16px rgba(0,0,0,0.18); }
  .act-edit:hover   { background: linear-gradient(135deg,#ff6d00,#e65100); color:#fff; }
  .act-delete:hover { background: linear-gradient(135deg,#e53935,#c62828); color:#fff; }

  .no-result { text-align:center; padding:40px 20px; color:var(--sub); font-size:14px; font-weight:600; }
  .no-result i { font-size:32px; color:var(--accent-mid); display:block; margin-bottom:10px; }

  /* PANEL */
  .panel-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.35);
    z-index:999; opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .panel-overlay.open { opacity:1; pointer-events:all; }
  .slide-panel {
    position:fixed; top:0; right:0; bottom:0; width:400px;
    background:#fff; z-index:1000;
    box-shadow:-8px 0 40px rgba(229,57,53,0.13);
    display:flex; flex-direction:column;
    transform:translateX(100%);
    transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .slide-panel.open { transform:translateX(0); }

  .panel-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 24px; border-bottom:1.5px solid var(--border);
    background:var(--accent-light); flex-shrink:0;
  }
  .panel-header-left { display:flex; align-items:center; gap:11px; }
  .panel-header-icon {
    width:38px; height:38px; border-radius:11px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:15px; box-shadow:0 3px 10px rgba(229,57,53,0.35);
  }
  .panel-title { font-size:15px; font-weight:800; color:#000; }
  .panel-sub   { font-size:11px; color:var(--sub); font-weight:500; margin-top:1px; }
  .panel-close {
    width:34px; height:34px; border-radius:10px;
    background:#fff; border:1.5px solid var(--accent-mid);
    color:var(--accent); font-size:14px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all 0.18s;
  }
  .panel-close:hover { background:var(--accent); color:#fff; }

  .panel-body { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:18px; }

  .form-group { display:flex; flex-direction:column; gap:6px; }
  .form-label { font-size:12.5px; font-weight:800; color:#000; display:flex; align-items:center; gap:6px; }
  .form-label i { color:var(--accent); font-size:11px; }
  .form-label .req { color:var(--accent); }
  .form-input, .form-select {
    width:100%; padding:10px 14px;
    border:1.5px solid #e8e8e8; border-radius:11px;
    font-size:13.5px; font-weight:600;
    font-family:'Nunito',sans-serif; color:#000; outline:none;
    background:#fafafa; transition:all 0.22s; appearance:none;
  }
  .form-input:focus, .form-select:focus {
    border-color:var(--accent); background:#fff;
    box-shadow:0 0 0 3px rgba(229,57,53,0.12);
  }
  .form-input::placeholder { color:#ccc; font-weight:500; }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .divider-label {
    display:flex; align-items:center; gap:10px;
    font-size:11px; font-weight:800; color:var(--sub);
    text-transform:uppercase; letter-spacing:0.06em;
  }
  .divider-label::before, .divider-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .panel-footer {
    padding:18px 24px; border-top:1.5px solid var(--border);
    display:flex; gap:10px; flex-shrink:0;
  }
  .btn-cancel {
    flex:1; padding:11px;
    border:1.5px solid #e0e0e0; border-radius:11px;
    background:#f5f5f5; color:#666;
    font-size:13.5px; font-weight:700;
    font-family:'Nunito',sans-serif; cursor:pointer; transition:all 0.18s;
  }
  .btn-cancel:hover { background:#ececec; }
  .btn-save {
    flex:2; padding:11px; border:none; border-radius:11px;
    background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    color:#fff; font-size:13.5px; font-weight:700;
    font-family:'Nunito',sans-serif; cursor:pointer;
    box-shadow:0 4px 14px rgba(229,57,53,0.30);
    transition:all 0.18s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .btn-save:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(229,57,53,0.40); }

  /* Excel */
  .excel-section { display:flex; flex-direction:column; gap:10px; }
  .excel-compact-row { display:flex; gap:8px; }
  .excel-dl-sm, .excel-ul-sm {
    flex:1; display:flex; align-items:center; justify-content:center; gap:7px;
    padding:9px 12px; border-radius:10px;
    font-size:12.5px; font-weight:700; font-family:'Nunito',sans-serif;
    cursor:pointer; border:none; transition:all 0.2s; white-space:nowrap;
  }
  .excel-dl-sm { background:#e8f5e9; color:#2e7d32; border:1.5px solid #c8e6c9; }
  .excel-dl-sm:hover { background:#2e7d32; color:#fff; }
  .excel-ul-sm { background:#e3f2fd; color:#1565c0; border:1.5px solid #bbdefb; }
  .excel-ul-sm:hover { background:#1565c0; color:#fff; }

  @media (max-width:480px) { .slide-panel { width:100%; } }
  @media (max-width:640px) {
    .search-box input { width:130px; }
    .table-header { padding:14px 16px; }
  }
</style>
</head>
<body>

<div class="table-card">
  <!-- Header -->
  <div class="table-header">
    <div class="title-group">
      <div class="title-icon"><i class="fa fa-truck"></i></div>
      <div>
        <div class="title-text">บันทึกทะเบียนรถ</div>
        <div class="title-sub" id="totalLabel">ข้อมูลรถทั้งหมดในระบบ</div>
      </div>
    </div>
    <div class="header-controls">
      <div class="search-box">
        <i class="fa fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="ค้นหา ID, ยี่ห้อ, รุ่น..." oninput="filterTable(this.value)">
      </div>
      <button class="btn-export" onclick="loadFromSheet()" title="รีโหลดข้อมูล">
        <i class="fa fa-rotate-right"></i> รีโหลด
      </button>
      <button class="btn-export" onclick="exportExcel()">
        <i class="fa fa-file-excel" style="color:#2e7d32"></i> Export
      </button>
      <button class="btn-add" onclick="openPanel('add')">
        <i class="fa fa-plus"></i> เพิ่มรถ
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Contractor</th>
          <th>TYPE</th>
          <th>ID</th>
          <th>Manufacturer</th>
          <th>Model</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="7" style="text-align:center;padding:40px;color:#999;">
            <i class="fa fa-spinner fa-spin" style="font-size:22px;color:#E53935;display:block;margin-bottom:10px;"></i>
            <span style="font-size:13px;">กำลังโหลดข้อมูล...</span>
          </td>
        </tr>
      </tbody>
    </table>
    <div id="noResult" class="no-result" style="display:none;">
      <i class="fa fa-magnifying-glass"></i>ไม่พบข้อมูลที่ค้นหา
    </div>
  </div>
</div>

<!-- Panel Overlay -->
<div class="panel-overlay" id="panelOverlay" onclick="closePanel()"></div>

<!-- Slide Panel -->
<div class="slide-panel" id="slidePanel">
  <div class="panel-header">
    <div class="panel-header-left">
      <div class="panel-header-icon" id="panelIcon"><i class="fa fa-plus"></i></div>
      <div>
        <div class="panel-title" id="panelTitle">เพิ่มรถใหม่</div>
        <div class="panel-sub" id="panelSub">กรอกข้อมูลรถที่ต้องการเพิ่ม</div>
      </div>
    </div>
    <div class="panel-close" onclick="closePanel()"><i class="fa fa-xmark"></i></div>
  </div>

  <div class="panel-body">
    <!-- Excel Section (add mode only) -->
    <div id="excelSection" class="excel-section">
      <div class="divider-label"><i class="fa fa-file-excel" style="color:#2e7d32"></i> นำเข้าจาก Excel</div>
      <div class="excel-compact-row">
        <button class="excel-dl-sm" onclick="downloadTemplate()">
          <i class="fa fa-file-arrow-down"></i> ดาวน์โหลด Template
        </button>
        <label class="excel-ul-sm" for="excelFile">
          <i class="fa fa-file-import"></i> อัปโหลด Excel
          <input type="file" id="excelFile" accept=".xlsx,.xls" onchange="handleExcelUpload(this)" style="display:none">
        </label>
      </div>
      <div class="divider-label">หรือกรอกข้อมูลเอง</div>
    </div>

    <div class="divider-label" id="manualLabel" style="display:none;">ข้อมูลทั่วไป</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label"><i class="fa fa-building"></i> Contractor <span class="req">*</span></label>
        <input type="text" class="form-input" id="f_contractor" placeholder="เช่น บริษัท ก">
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa fa-tag"></i> TYPE <span class="req">*</span></label>
        <input type="text" class="form-input" id="f_type" placeholder="เช่น Truck, Van, Pickup">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label"><i class="fa fa-id-badge"></i> Vehicle ID <span class="req">*</span></label>
      <input type="text" class="form-input" id="f_id" placeholder="เช่น VH-008">
    </div>

    <div class="divider-label">ข้อมูลรถ</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label"><i class="fa fa-industry"></i> Manufacturer <span class="req">*</span></label>
        <input type="text" class="form-input" id="f_manufacturer" placeholder="เช่น Isuzu, Toyota">
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fa fa-car"></i> Model <span class="req">*</span></label>
        <input type="text" class="form-input" id="f_model" placeholder="เช่น FTR 240">
      </div>
    </div>
  </div>

  <div class="panel-footer">
    <button class="btn-cancel" onclick="closePanel()">ยกเลิก</button>
    <button class="btn-save" onclick="saveForm()">
      <i class="fa fa-floppy-disk"></i>
      <span id="saveBtnText">บันทึกข้อมูล</span>
    </button>
  </div>
</div>

<script>
// ============================================================
// ⚙️ CONFIG — URL ของ Apps Script
// ============================================================
var GAS_URL = 'https://script.google.com/macros/s/AKfycbxOuFWQG2qJgzLNHKRCeffg4y8KZraiVxL2pCssthl3E7tbSXOQ3b1MhYUqH5766CTK/exec';

var _editRowIndex    = null;
var _editSheetRowIndex = null;

// ============================================================
// PANEL
// ============================================================
function openPanel(mode, rowData) {
  _editRowIndex      = null;
  _editSheetRowIndex = null;

  var icon    = document.getElementById('panelIcon');
  var title   = document.getElementById('panelTitle');
  var sub     = document.getElementById('panelSub');
  var saveBtn = document.getElementById('saveBtnText');
  var excelSec = document.getElementById('excelSection');
  var manualLbl = document.getElementById('manualLabel');

  ['f_contractor','f_type','f_id','f_manufacturer','f_model'].forEach(function(id){
    document.getElementById(id).value = '';
  });

  if (mode === 'edit' && rowData) {
    _editRowIndex      = rowData.index;
    _editSheetRowIndex = rowData.sheetRowIndex;
    icon.innerHTML     = '<i class="fa fa-pen-to-square"></i>';
    title.textContent  = 'แก้ไขข้อมูลรถ';
    sub.textContent    = 'ID: ' + rowData.id;
    saveBtn.textContent = 'บันทึกการแก้ไข';
    excelSec.style.display  = 'none';
    manualLbl.style.display = '';

    document.getElementById('f_contractor').value   = rowData.contractor;
    document.getElementById('f_type').value         = rowData.type;
    document.getElementById('f_id').value           = rowData.id;
    document.getElementById('f_manufacturer').value = rowData.manufacturer;
    document.getElementById('f_model').value        = rowData.model;
  } else {
    icon.innerHTML     = '<i class="fa fa-plus"></i>';
    title.textContent  = 'เพิ่มรถใหม่';
    sub.textContent    = 'กรอกข้อมูลรถที่ต้องการเพิ่ม';
    saveBtn.textContent = 'บันทึกข้อมูล';
    excelSec.style.display  = '';
    manualLbl.style.display = 'none';
  }

  document.getElementById('slidePanel').classList.add('open');
  document.getElementById('panelOverlay').classList.add('open');
}

function closePanel() {
  document.getElementById('slidePanel').classList.remove('open');
  document.getElementById('panelOverlay').classList.remove('open');
}

// ============================================================
// SAVE
// ============================================================
function saveForm() {
  var contractor   = document.getElementById('f_contractor').value.trim();
  var type         = document.getElementById('f_type').value.trim();
  var id           = document.getElementById('f_id').value.trim();
  var manufacturer = document.getElementById('f_manufacturer').value.trim();
  var model        = document.getElementById('f_model').value.trim();
  var isEdit       = _editRowIndex !== null;

  if (!contractor || !type || !id || !manufacturer || !model) {
    Swal.fire({ icon:'warning', title:'ข้อมูลไม่ครบ!', text:'กรุณากรอกข้อมูลให้ครบทุกช่อง', confirmButtonColor:'#E53935', confirmButtonText:'ตกลง' });
    return;
  }

  Swal.fire({ title: isEdit ? 'กำลังบันทึก...' : 'กำลังเพิ่มข้อมูล...', allowOutsideClick:false, didOpen:function(){ Swal.showLoading(); } });

  var action = isEdit ? 'updateTypeCar' : 'saveTypeCar';
  var url = GAS_URL + '?action=' + action
    + '&contractor='   + encodeURIComponent(contractor)
    + '&type='         + encodeURIComponent(type)
    + '&id='           + encodeURIComponent(id)
    + '&manufacturer=' + encodeURIComponent(manufacturer)
    + '&model='        + encodeURIComponent(model);
  if (isEdit && _editSheetRowIndex) {
    url += '&rowIndex=' + encodeURIComponent(_editSheetRowIndex);
  }

  fetch(url)
    .then(function(res){ return res.json(); })
    .then(function(data){
      if (!data.ok) {
        Swal.fire({ icon:'error', title:'บันทึกไม่สำเร็จ', text: data.message || 'เกิดข้อผิดพลาด', confirmButtonColor:'#E53935' });
        return;
      }
      closePanel();
      loadFromSheet();
      Swal.fire({ icon:'success', title: isEdit ? 'แก้ไขสำเร็จ!' : 'เพิ่มรถสำเร็จ!', toast:true, position:'top-end', showConfirmButton:false, timer:2500, timerProgressBar:true });
    })
    .catch(function(err){
      Swal.fire({ icon:'error', title:'เชื่อมต่อไม่ได้', text: err.message, confirmButtonColor:'#E53935' });
    });
}

// ============================================================
// EDIT ROW
// ============================================================
function editRow(btn) {
  var row   = btn.closest('tr');
  var tbody = document.getElementById('tableBody');
  var index = Array.from(tbody.rows).indexOf(row);
  var sheetRowIndex = row.getAttribute('data-sheet-row');
  var cells = row.cells;
  openPanel('edit', {
    index:        index,
    sheetRowIndex: sheetRowIndex ? parseInt(sheetRowIndex) : null,
    contractor:   ((cells[1].querySelector('.contractor-chip')||{}).textContent||'').trim(),
    type:         ((cells[2].querySelector('.type-badge')||{}).textContent||'').trim(),
    id:           ((cells[3].querySelector('.id-code')||{}).textContent||'').trim(),
    manufacturer: ((cells[4].querySelector('.maker-name')||{}).textContent||'').trim(),
    model:        ((cells[5].querySelector('.model-text')||{}).textContent||'').trim()
  });
}

// ============================================================
// DELETE ROW
// ============================================================
function deleteRow(btn) {
  var row = btn.closest('tr');
  var sheetRowIndex = row.getAttribute('data-sheet-row');

  Swal.fire({
    title:'ยืนยันการลบ?', text:'ข้อมูลรถนี้จะถูกลบออกจากระบบ',
    icon:'warning', showCancelButton:true,
    confirmButtonColor:'#E53935', cancelButtonColor:'#d1d5db',
    confirmButtonText:'<i class="fa fa-trash-can"></i> ลบเลย',
    cancelButtonText:'ยกเลิก', reverseButtons:true
  }).then(function(result){
    if (!result.isConfirmed) return;
    Swal.fire({ title:'กำลังลบ...', allowOutsideClick:false, didOpen:function(){ Swal.showLoading(); } });

    fetch(GAS_URL + '?action=deleteTypeCar&rowIndex=' + encodeURIComponent(sheetRowIndex))
      .then(function(res){ return res.json(); })
      .then(function(data){
        if (!data.ok) {
          Swal.fire({ icon:'error', title:'ลบไม่สำเร็จ', text: data.message, confirmButtonColor:'#E53935' });
          return;
        }
        row.style.transition = 'opacity 0.25s, transform 0.25s';
        row.style.opacity = '0'; row.style.transform = 'translateX(20px)';
        setTimeout(function(){ row.remove(); renumberRows(); }, 250);
        Swal.fire({ icon:'success', title:'ลบสำเร็จ!', toast:true, position:'top-end', showConfirmButton:false, timer:2000, timerProgressBar:true });
      })
      .catch(function(err){
        Swal.fire({ icon:'error', title:'เชื่อมต่อไม่ได้', text: err.message, confirmButtonColor:'#E53935' });
      });
  });
}

// ============================================================
// LOAD FROM SHEET
// ============================================================
function loadFromSheet() {
  var tbody = document.getElementById('tableBody');
  tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999;"><i class="fa fa-spinner fa-spin" style="font-size:22px;color:#E53935;display:block;margin-bottom:10px;"></i><span style="font-size:13px;">กำลังโหลดข้อมูล...</span></td></tr>';

  fetch(GAS_URL + '?action=getTypeCar')
    .then(function(res){ return res.json(); })
    .then(function(data){
      tbody.innerHTML = '';
      if (!data.ok) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#E53935;font-size:13px;"><i class="fa fa-triangle-exclamation" style="display:block;font-size:22px;margin-bottom:8px;"></i>' + (data.message || 'โหลดข้อมูลไม่สำเร็จ') + '</td></tr>';
        return;
      }
      if (!data.rows || data.rows.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:#999;font-size:13px;"><i class="fa fa-inbox" style="font-size:28px;display:block;margin-bottom:10px;color:#FFCDD2;"></i>ยังไม่มีข้อมูลในระบบ</td></tr>';
        document.getElementById('totalLabel').textContent = 'ยังไม่มีข้อมูล';
        return;
      }
      data.rows.forEach(function(row, idx){
        appendRow(idx + 1, row.contractor, row.type, row.id, row.manufacturer, row.model, row.rowIndex);
      });
      document.getElementById('totalLabel').textContent = 'ทั้งหมด ' + data.rows.length + ' คัน';
    })
    .catch(function(err){
      tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:30px;color:#E53935;font-size:13px;"><i class="fa fa-triangle-exclamation" style="display:block;font-size:22px;margin-bottom:8px;"></i>เชื่อมต่อไม่ได้: ' + err.message + '</td></tr>';
    });
}

// ============================================================
// APPEND ROW
// ============================================================
function appendRow(num, contractor, type, id, manufacturer, model, sheetRowIndex) {
  var tbody = document.getElementById('tableBody');
  var tr = document.createElement('tr');
  tr.setAttribute('data-sheet-row', sheetRowIndex || '');
  tr.style.animation = 'fadeRow 0.3s ease both';
  tr.innerHTML =
    '<td><div class="row-num">' + num + '</div></td>' +
    '<td><span class="contractor-chip">' + escHtml(contractor) + '</span></td>' +
    '<td><span class="type-badge">' + escHtml(type) + '</span></td>' +
    '<td><span class="id-code">' + escHtml(id) + '</span></td>' +
    '<td><div class="maker-group"><div class="maker-dot ' + makerColor(manufacturer) + '">' + initials(manufacturer) + '</div><span class="maker-name">' + escHtml(manufacturer) + '</span></div></td>' +
    '<td><span class="model-text">' + escHtml(model) + '</span></td>' +
    '<td><div class="action-group">' +
      '<button class="act-btn act-edit" onclick="editRow(this)" title="แก้ไข"><i class="fa fa-pen-to-square"></i></button>' +
      '<button class="act-btn act-delete" onclick="deleteRow(this)" title="ลบ"><i class="fa fa-trash-can"></i></button>' +
    '</div></td>';
  tbody.appendChild(tr);
}

// ============================================================
// SEARCH
// ============================================================
function filterTable(q) {
  var q2 = q.trim().toLowerCase();
  var rows = document.querySelectorAll('#tableBody tr');
  var shown = 0;
  rows.forEach(function(row){
    var match = !q2 || row.textContent.toLowerCase().includes(q2);
    row.style.display = match ? '' : 'none';
    if (match) shown++;
  });
  document.getElementById('noResult').style.display = shown === 0 ? 'block' : 'none';
}

// ============================================================
// EXCEL
// ============================================================
function downloadTemplate() {
  var wb = XLSX.utils.book_new();
  var data = [
    ['Contractor','TYPE','ID','Manufacturer','Model'],
    ['บริษัท ก','Truck','VH-008','Isuzu','FTR 240'],
    ['บริษัท ข','Van','VH-009','Toyota','HiAce 3.0']
  ];
  var ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:18},{wch:12},{wch:12},{wch:18},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws, 'Vehicle Data');
  XLSX.writeFile(wb, 'ThaiDrill_Vehicle_Template.xlsx');
  Swal.fire({ icon:'success', title:'ดาวน์โหลดสำเร็จ!', toast:true, position:'top-end', showConfirmButton:false, timer:2500 });
}

function handleExcelUpload(input) {
  var file = input.files ? input.files[0] : null;
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = new Uint8Array(e.target.result);
      var wb   = XLSX.read(data, { type:'array' });
      var ws   = wb.Sheets[wb.SheetNames[0]];
      var rows = XLSX.utils.sheet_to_json(ws, { header:1 });
      var dataRows = rows.slice(1).filter(function(r){ return r.length >= 5 && r[0]; });
      if (dataRows.length === 0) {
        Swal.fire({ icon:'warning', title:'ไม่พบข้อมูล', text:'ไม่พบข้อมูลในไฟล์ กรุณาตรวจสอบรูปแบบ', confirmButtonColor:'#E53935' });
        return;
      }
      Swal.fire({
        icon:'question', title:'พบข้อมูล ' + dataRows.length + ' รายการ',
        text:'ต้องการนำเข้าข้อมูลทั้งหมดใช่หรือไม่?',
        showCancelButton:true,
        confirmButtonColor:'#2e7d32', cancelButtonColor:'#d1d5db',
        confirmButtonText:'<i class="fa fa-file-import"></i> นำเข้าเลย',
        cancelButtonText:'ยกเลิก', reverseButtons:true
      }).then(function(result){
        if (!result.isConfirmed) return;
        // บันทึกทีละ row ไปยัง Sheet
        var promises = dataRows.map(function(r){
          var c=String(r[0]||'').trim(), t=String(r[1]||'').trim(),
              id=String(r[2]||'').trim(), mfr=String(r[3]||'').trim(), mdl=String(r[4]||'').trim();
          var url = GAS_URL + '?action=saveTypeCar'
            + '&contractor='   + encodeURIComponent(c)
            + '&type='         + encodeURIComponent(t)
            + '&id='           + encodeURIComponent(id)
            + '&manufacturer=' + encodeURIComponent(mfr)
            + '&model='        + encodeURIComponent(mdl);
          return fetch(url).then(function(res){ return res.json(); });
        });
        Swal.fire({ title:'กำลังนำเข้า...', allowOutsideClick:false, didOpen:function(){ Swal.showLoading(); } });
        Promise.all(promises).then(function(){
          document.getElementById('excelFile').value = '';
          closePanel();
          loadFromSheet();
          Swal.fire({ icon:'success', title:'นำเข้าสำเร็จ!', text:'เพิ่มข้อมูล ' + dataRows.length + ' รายการเรียบร้อย', toast:true, position:'top-end', showConfirmButton:false, timer:3000 });
        });
      });
    } catch(err) {
      Swal.fire({ icon:'error', title:'เกิดข้อผิดพลาด', text:'ไม่สามารถอ่านไฟล์ได้ กรุณาใช้ Template ที่ดาวน์โหลดมา', confirmButtonColor:'#E53935' });
    }
  };
  reader.readAsArrayBuffer(file);
}

function exportExcel() {
  var rows = document.querySelectorAll('#tableBody tr');
  var data = [['Contractor','TYPE','ID','Manufacturer','Model']];
  rows.forEach(function(row){
    var c = row.cells;
    if (!c || !c.length) return;
    data.push([
      ((c[1].querySelector('.contractor-chip')||{}).textContent||'').trim(),
      ((c[2].querySelector('.type-badge')||{}).textContent||'').trim(),
      ((c[3].querySelector('.id-code')||{}).textContent||'').trim(),
      ((c[4].querySelector('.maker-name')||{}).textContent||'').trim(),
      ((c[5].querySelector('.model-text')||{}).textContent||'').trim()
    ]);
  });
  var ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:18},{wch:12},{wch:12},{wch:18},{wch:18}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Vehicle Data');
  XLSX.writeFile(wb, 'ThaiDrill_Vehicle_Export.xlsx');
  Swal.fire({ icon:'success', title:'Export สำเร็จ!', toast:true, position:'top-end', showConfirmButton:false, timer:2500 });
}

// ============================================================
// HELPERS
// ============================================================
function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function initials(m) { return String(m||'').split(' ').map(function(w){return w[0]||'';}).join('').substring(0,2).toUpperCase() || '??'; }
function makerColor(m) {
  var map = { isuzu:'mk-blue', toyota:'mk-red', honda:'mk-blue', mitsubishi:'mk-orange', 'ud trucks':'mk-dark', hino:'mk-green', nissan:'mk-dark', caterpillar:'mk-dark' };
  return map[(m||'').toLowerCase()] || 'mk-dark';
}
function renumberRows() {
  document.querySelectorAll('#tableBody tr').forEach(function(r,i){
    var num = r.querySelector('.row-num');
    if (num) num.textContent = i + 1;
  });
}

// โหลดข้อมูลเมื่อหน้าเปิด
document.addEventListener('DOMContentLoaded', function(){ loadFromSheet(); });
</script>
