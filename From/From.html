<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>แบบฟอร์มขอเบิกทรัพย์สินบริษัท</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --red:        #E53935;
      --red-dark:   #C62828;
      --red-light:  #FFEBEE;
      --red-border: #FFCDD2;
      --dark:       #1a1a2e;
      --muted:      #64748b;
      --border:     #e2e8f0;
      --bg:         #f4f6f8;
      --surface:    #ffffff;
      --blue:       #1976D2;
      --blue-dark:  #1565C0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--dark);
    }
    .container {
      max-width: 1700px;
      margin: 0 auto;
      padding: 16px 20px;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      background: var(--surface);
      border-left: 5px solid var(--red);
      padding: 14px 20px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 16px;
      border-radius: 10px;
    }
    .header-icon {
      width: 38px; height: 38px; border-radius: 9px; flex-shrink: 0;
      background: linear-gradient(135deg,var(--red),var(--red-dark));
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px;
      box-shadow: 0 4px 10px rgba(229,57,53,0.3);
    }
    .page-header h1 { font-size: 18px; font-weight: 700; }
    .page-header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* ===== FORM SECTION ===== */
    .form-section {
      background: var(--surface);
      border-radius: 10px;
      border: 1.5px solid var(--border);
      padding: 16px 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    /* ===== FIELD GROUP ===== */
    .fg {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .fl {
      display: block;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .fl .req { color: var(--red); margin-left: 2px; }

    /* ===== FORM LAYOUT ===== */
    .form-body {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }
    .form-fields {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .fields-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    /* Remark row: full width single field */
    .remark-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    /* ===== BUTTON BOX ===== */
    .btn-box {
      flex-shrink: 0;
      width: 110px;
      background: linear-gradient(160deg, #fff5f5, #ffe8e8);
      border: 1.5px solid var(--red-border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 10px;
      box-shadow: 0 2px 10px rgba(229,57,53,0.08);
      cursor: pointer;
      transition: all 0.2s;
      align-self: stretch;
    }
    .btn-box:hover {
      background: linear-gradient(160deg, #ffecec, #ffd6d6);
      border-color: var(--red);
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(229,57,53,0.18);
    }
    .btn-box .btn-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 18px;
      box-shadow: 0 4px 12px rgba(229,57,53,0.35);
    }
    .btn-box .btn-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--red-dark);
      text-align: center;
      line-height: 1.4;
    }

    /* ===== FORM CONTROL ===== */
    .fc {
      width: 100%; padding: 9px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; font-family: 'Noto Sans Thai',sans-serif;
      background: var(--surface); color: var(--dark);
      transition: border-color 0.2s, box-shadow 0.2s; outline: none;
      height: 40px;
    }
    .fc:focus { border-color: var(--red); box-shadow: 0 0 0 3px rgba(229,57,53,0.1); }
    .fc::placeholder { color: #b0bec5; font-size: 13px; }
    select.fc { cursor: pointer; }

    /* ===== BUTTONS ===== */
    .btn {
      padding: 10px 22px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans Thai',sans-serif;
      display: inline-flex; align-items: center; gap: 7px;
      transition: all 0.2s; white-space: nowrap; height: 40px;
    }
    .btn-blue { background: var(--blue); color: #fff; box-shadow: 0 3px 10px rgba(25,118,210,0.3); }
    .btn-blue:hover { background: var(--blue-dark); transform: translateY(-1px); }
    .btn-outline { background: var(--red-light); color: var(--red); border: 1.5px solid var(--red-border); }
    .btn-outline:hover { background: #ffd7db; border-color: var(--red); }
    .btn-del {
      background: none; border: none; color: #ef4444;
      cursor: pointer; padding: 5px 9px; border-radius: 7px;
      font-size: 14px; transition: all 0.15s;
    }
    .btn-del:hover { background: #fee2e2; transform: scale(1.1); }

    /* ===== TABLE ===== */
    .tbl-section {
      background: var(--surface);
      border-radius: 10px;
      border: 1.5px solid var(--border);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      overflow: hidden;
    }
    .tbl-hd {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1.5px solid var(--border);
      flex-wrap: wrap; gap: 10px;
    }
    .tbl-title {
      font-size: 15px; font-weight: 700; color: var(--red);
      display: flex; align-items: center; gap: 8px;
    }
    .badge-count {
      background: var(--red); color: #fff;
      font-size: 12px; font-weight: 700;
      padding: 2px 10px; border-radius: 100px;
    }
    .tbl-actions { display: flex; gap: 8px; align-items: center; }
    .table-container { overflow-x: auto; }
    table {
      width: 100%; border-collapse: collapse;
      font-size: 13.5px; min-width: 1100px;
    }
    thead th {
      background: #fafafa; padding: 11px 12px; text-align: left;
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.04em;
      border-bottom: 1.5px solid var(--border); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 10px 12px; vertical-align: middle; }

    .no-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--red); color: #fff;
      font-size: 10px; font-weight: 800;
    }
    .tag {
      display: inline-block; padding: 2px 9px; border-radius: 100px;
      font-size: 11px; font-weight: 600;
      background: var(--red-light); color: var(--red-dark);
      border: 1px solid var(--red-border); white-space: nowrap;
    }
    .amt { font-weight: 700; color: var(--red); font-family: monospace; font-size: 13px; }
    .td-muted { color: var(--muted); font-size: 13px; }
    .td-remark { color: var(--muted); font-size: 12px; max-width: 160px; }

    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px; gap: 10px; color: var(--muted);
    }
    .empty-state i { font-size: 36px; opacity: 0.18; }
    .empty-state p { font-size: 13px; font-weight: 600; }

    /* toast */
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 10px 18px;
      font-size: 13px; font-weight: 600;
      transform: translateY(20px); opacity: 0;
      transition: all 0.3s; pointer-events: none; z-index: 999;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.ok  { border-left: 4px solid #10b981; }
    .toast.err { border-left: 4px solid var(--red); }

    /* ===== RESPONSIVE ===== */
    @media(max-width: 1100px) {
      .fields-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media(max-width: 780px) {
      .fields-row { grid-template-columns: repeat(2, 1fr); }
    }
    @media(max-width: 520px) {
      .form-body { flex-direction: column; }
      .fields-row { grid-template-columns: 1fr; }
      .btn-box {
        width: 100%; flex-direction: row;
        justify-content: center; gap: 12px;
        padding: 12px 18px; align-self: auto;
      }
      .btn-box .btn-label { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- HEADER -->
  <div class="page-header">
    <div class="header-icon"><i class="fas fa-box"></i></div>
    <div>
      <h1>แบบฟอร์มขอเบิกทรัพย์สินบริษัท</h1>
      <p>กรอกข้อมูลพนักงานและเพิ่มรายการทรัพย์สินที่ต้องการเบิก</p>
    </div>
  </div>

  <!-- ADD ITEM FORM -->
  <div class="form-section">
    <form id="addItemForm">
      <div class="form-body">

        <!-- ── Fields ── -->
        <div class="form-fields">

          <!-- Row 1 -->
          <div class="fields-row">
            <div class="fg">
              <label class="fl">Contractor <span class="req">*</span></label>
              <select class="fc" id="PR_contractor">
                <option value="">Select Contractor</option>
              </select>
            </div>
            <div class="fg">
              <label class="fl">Type <span class="req">*</span></label>
              <input type="text" class="fc" id="PR_type" placeholder="Type">
            </div>
            <div class="fg">
              <label class="fl">ID</label>
              <input type="text" class="fc" id="PR_id" placeholder="ID">
            </div>
            <div class="fg">
              <label class="fl">Manufacturer</label>
              <input type="text" class="fc" id="PR_manufacturer" placeholder="Manufacturer">
            </div>
          </div>

          <!-- Row 2 -->
          <div class="fields-row">
            <div class="fg">
              <label class="fl">Model</label>
              <input type="text" class="fc" id="PR_model" placeholder="Model">
            </div>
            <div class="fg">
              <label class="fl">Serial No.</label>
              <input type="text" class="fc" id="PR_serialNo" placeholder="Serial No.">
            </div>
            <div class="fg">
              <label class="fl">Chassis No.</label>
              <input type="text" class="fc" id="PR_chassisNo" placeholder="Chassis No.">
            </div>
            <div class="fg">
              <label class="fl">Price ($/hr)</label>
              <input type="number" class="fc" id="PR_price" placeholder="0.00" min="0" step="0.01">
            </div>
          </div>

          <!-- Row 3 — Remark full width -->
          <div class="remark-row">
            <div class="fg">
              <label class="fl">Remark / หมายเหตุ</label>
          <textarea name="" id="" class="fc" id="PR_remark" ></textarea>

            </div>
          </div>

        </div>

        <!-- ── Add Button Box ── -->
        <button type="submit" class="btn-box" title="Add Item">
          <div class="btn-icon"><i class="fas fa-plus"></i></div>
          <div class="btn-label">Add</div>
        </button>

      </div>
    </form>
  </div>

  <!-- TABLE -->
  <div class="tbl-section">
    <div class="tbl-hd">
      <div class="tbl-title">
        <i class="fas fa-list-ul"></i>
        Equipment List
        <span class="badge-count" id="cartCount">0</span>
      </div>
      <div class="tbl-actions">
        <button class="btn btn-outline" id="clearAllBtn" onclick="clearAllItems()"
          style="display:none; height:36px; font-size:12px; padding:0 14px;">
          <i class="fas fa-trash"></i> Clear All
        </button>
        <button class="btn btn-blue" onclick="submitAll()"
          style="height:36px; font-size:13px; padding:0 20px;">
          <i class="fas fa-save"></i> Save
        </button>
      </div>
    </div>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Contractor</th>
            <th>Type</th>
            <th>ID</th>
            <th>Manufacturer</th>
            <th>Model</th>
            <th>Serial No.</th>
            <th>Chassis No.</th>
            <th>Price ($/hr)</th>
            <th>Remark / หมายเหตุ</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="cartBody">
          <tr>
            <td colspan="11">
              <div class="empty-state">
                <i class="fas fa-box-open"></i>
                <p>No items yet — fill in the form above and click "Add"</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
let cartItems = [];

$(document).ready(function() {
  loadDropdown();

  $('#addItemForm').submit(function(e) {
    e.preventDefault();
    const contractor = $('#PR_contractor').val().trim();
    const type       = $('#PR_type').val().trim();
    if (!contractor) return showToast('Please select Contractor', 'err');
    if (!type)       return showToast('Please enter Type', 'err');

    cartItems.push({
      id:          Date.now().toString(),
      contractor,
      type,
      itemId:      $('#PR_id').val().trim()           || '-',
      manufacturer:$('#PR_manufacturer').val().trim() || '-',
      model:       $('#PR_model').val().trim()        || '-',
      serialNo:    $('#PR_serialNo').val().trim()     || '-',
      chassisNo:   $('#PR_chassisNo').val().trim()    || '-',
      price:       $('#PR_price').val().trim()        || '0',
      remark:      $('#PR_remark').val().trim()       || '-',
    });

    renderTable();
    clearAddForm();
    showToast('✅ Item added successfully', 'ok');
    $('#PR_contractor').focus();
  });
});

function loadDropdown() {
  const contractors = ['Contractor A','Contractor B','Contractor C','Contractor D'];
  const $s = $('#PR_contractor');
  $s.html('<option value="">Select Contractor</option>');
  contractors.forEach(c => $s.append(`<option value="${c}">${c}</option>`));
}

function renderTable() {
  $('#cartCount').text(cartItems.length);
  $('#clearAllBtn').toggle(cartItems.length > 0);

  if (cartItems.length === 0) {
    $('#cartBody').html(`<tr><td colspan="11">
      <div class="empty-state">
        <i class="fas fa-box-open"></i>
        <p>No items yet — fill in the form above and click "Add"</p>
      </div></td></tr>`);
    return;
  }

  let html = '';
  cartItems.forEach((item, i) => {
    html += `<tr>
      <td><span class="no-badge">${i+1}</span></td>
      <td><span class="tag">${item.contractor}</span></td>
      <td style="font-weight:600;">${item.type}</td>
      <td class="td-muted">${item.itemId}</td>
      <td class="td-muted">${item.manufacturer}</td>
      <td class="td-muted">${item.model}</td>
      <td class="td-muted">${item.serialNo}</td>
      <td class="td-muted">${item.chassisNo}</td>
      <td class="amt">$${Number(item.price).toLocaleString()}</td>
      <td class="td-remark">${item.remark}</td>
      <td>
        <button class="btn-del" onclick="removeItem(${i})" title="Delete">
          <i class="fas fa-trash-alt"></i>
        </button>
      </td>
    </tr>`;
  });
  $('#cartBody').html(html);
}

function removeItem(index) {
  Swal.fire({
    title: 'Confirm Delete?',
    text: `Remove "${cartItems[index].type}" from the list?`,
    icon: 'warning', showCancelButton: true,
    confirmButtonText: 'Delete', cancelButtonText: 'Cancel',
    confirmButtonColor: '#E53935', cancelButtonColor: '#94a3b8'
  }).then(r => {
    if (r.isConfirmed) { cartItems.splice(index,1); renderTable(); showToast('Item removed','ok'); }
  });
}

function clearAllItems() {
  Swal.fire({
    title: 'Clear all items?', icon: 'warning', showCancelButton: true,
    confirmButtonText: 'Clear All', cancelButtonText: 'Cancel',
    confirmButtonColor: '#E53935'
  }).then(r => { if (r.isConfirmed) { cartItems=[]; renderTable(); showToast('List cleared','ok'); } });
}

function submitAll() {
  if (cartItems.length === 0) return showToast('Please add at least 1 item', 'err');

  Swal.fire({
    title: 'Confirm Save?',
    html: `<div style="text-align:left;font-size:13px;line-height:2.2;">
      <b>Total items:</b> <span style="color:#E53935;font-weight:800;">${cartItems.length} items</span>
    </div>`,
    icon: 'question', showCancelButton: true,
    confirmButtonText: '<i class="fas fa-save"></i> Confirm Save',
    cancelButtonText: 'Cancel',
    confirmButtonColor: '#E53935', cancelButtonColor: '#94a3b8'
  }).then(result => {
    if (!result.isConfirmed) return;
    Swal.fire({ title:'Saving...', allowOutsideClick:false, didOpen:()=>Swal.showLoading() });
    setTimeout(() => {
      Swal.close();
      Swal.fire({
        icon:'success', title:'Saved Successfully!',
        text: 'Data has been saved.',
        confirmButtonColor:'#E53935'
      }).then(() => { cartItems=[]; renderTable(); clearAddForm(); });
    }, 1000);
  });
}

function clearAddForm() {
  $('#PR_contractor').val('');
  $('#PR_type,#PR_id,#PR_manufacturer,#PR_model,#PR_serialNo,#PR_chassisNo,#PR_price,#PR_remark').val('');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type||'ok');
  clearTimeout(t._t);
  t._t = setTimeout(()=>{ t.className='toast'; }, 2800);
}

window.removeItem    = removeItem;
window.clearAllItems = clearAllItems;
window.submitAll     = submitAll;
</script>
</body>
</html>
