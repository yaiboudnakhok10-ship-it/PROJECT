<!-- ============================================================
  🔐 SESSION GUARD — ตรวจสอบก่อนโหลดทุกอย่าง
  วิธีใช้:
    ตอน Login สำเร็จ ให้ run คำสั่งนี้ใน login.html:
      localStorage.setItem('td_session', JSON.stringify({
        token: 'xxxxxxxx',   // token จาก server
        user: 'ชื่อผู้ใช้',
        expires: Date.now() + (8 * 60 * 60 * 1000)  // หมดอายุ 8 ชั่วโมง
      }));
      window.location.href = 'index.html';
============================================================ -->
<script>
(function() {
  'use strict';

  var LOGIN_PAGE = 'login.html';   // ← เปลี่ยนชื่อหน้า login ตรงนี้
  var SESSION_KEY = 'td_session';

  function redirectToLogin(reason) {
    // ล้าง session เก่าออก
    try { localStorage.removeItem(SESSION_KEY); } catch(e) {}

    // ถ้าอยู่หน้า login อยู่แล้วไม่ต้อง redirect ซ้ำ
    if (window.location.href.indexOf(LOGIN_PAGE) !== -1) return;

    // redirect ทันที (ก่อนที่ browser จะ render หน้าเลย)
    window.location.replace(LOGIN_PAGE);
  }

  try {
    var raw = localStorage.getItem(SESSION_KEY);

    // ❌ ไม่มี session เลย
    if (!raw) { redirectToLogin('no_session'); return; }

    var session = JSON.parse(raw);

    // ❌ session ไม่สมบูรณ์ — เช็ค sessionId หรือ username อย่างใดอย่างหนึ่ง
    if (!session || (!session.sessionId && !session.username)) {
      redirectToLogin('invalid_session'); return;
    }

    // ❌ session หมดอายุ (ถ้ามี field expires)
    if (session.expires && Date.now() > session.expires) {
      redirectToLogin('session_expired'); return;
    }

    // ✅ ผ่านทุกเงื่อนไข — โหลดหน้าต่อได้
    window._CIV_SessionData = session;

  } catch(e) {
    // ❌ parse error หรือ localStorage ไม่ทำงาน
    redirectToLogin('parse_error');
  }
})();
</script>

<script>
// ============================================================
// 🔐 SESSION CONFIG — แก้ไขค่าตรงนี้
// ============================================================
var _CIV_CONFIG = {
  LOGIN_PAGE   : 'login.html',   // ← ชื่อไฟล์หน้า login
  SESSION_KEY  : 'td_session',   // ← key ใน localStorage
  WARN_BEFORE  : 60 * 60 * 1000,  // ← แจ้งเตือนก่อนหมด 1 ชั่วโมง (session 7 วัน)
  CHECK_INTERVAL: 60 * 1000      // ← เช็ค session ทุก 1 นาที
};

// ============================================================
// 🔐 SESSION GUARD FUNCTIONS
// ============================================================

/** ดึง session object จาก localStorage */
function _CIV_GetSession() {
  try {
    var raw = localStorage.getItem(_CIV_CONFIG.SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

/** ตรวจสอบ session ว่ายังใช้ได้มั้ย */
function _CIV_IsSessionValid(session) {
  if (!session) return false;
  // ต้องมี sessionId หรือ username อย่างใดอย่างหนึ่ง
  if (!session.sessionId && !session.username) return false;
  // ถ้ามี expires → เช็คหมดอายุ
  if (session.expires && Date.now() > session.expires) return false;
  return true;
}

/** Redirect ไป login พร้อมลบ session */
function _CIV_RedirectToLogin(reason) {
  try { localStorage.removeItem(_CIV_CONFIG.SESSION_KEY); } catch(e) {}
  window.location.replace(_CIV_CONFIG.LOGIN_PAGE + '?reason=' + (reason || 'unauthorized'));
}

/**
 * เช็ค session แบบ continuous (ทุก 1 นาที)
 * ถ้าหมดอายุ → popup แจ้งเตือน → redirect
 * ถ้าใกล้หมด → แสดง banner เตือน
 */
function _CIV_StartSessionWatcher() {
  var _warned = false;
  var _expired = false;

  setInterval(function() {
    if (_expired) return; // ป้องกัน popup ซ้ำ

    var session = _CIV_GetSession();

    // ❌ Session หายไปจาก localStorage (เช่น tab อื่น logout)
    if (!session || (!session.sessionId && !session.username)) {
      _expired = true;
      _CIV_ShowSessionExpiredPopup('session_removed');
      return;
    }

    // ❌ Session หมดอายุแล้ว
    if (session.expires && Date.now() > session.expires) {
      _expired = true;
      _CIV_ShowSessionExpiredPopup('session_expired');
      return;
    }

    // ⚠️ Session ใกล้หมด (เตือนล่วงหน้า 15 นาที)
    if (!_warned && session.expires) {
      var timeLeft = session.expires - Date.now();
      if (timeLeft <= _CIV_CONFIG.WARN_BEFORE) {
        _warned = true;
        var banner = document.getElementById('_CIV_SessionBanner');
        if (banner) banner.style.display = 'block';
      }
    }
  }, _CIV_CONFIG.CHECK_INTERVAL);
}

/** Popup แจ้งเตือน session หมด */
function _CIV_ShowSessionExpiredPopup(reason) {
  Swal.fire({
    title: 'Session หมดอายุ',
    text: 'กรุณาเข้าสู่ระบบใหม่อีกครั้ง',
    icon: 'warning',
    confirmButtonColor: '#E53935',
    confirmButtonText: '<i class="fa fa-right-to-bracket"></i> เข้าสู่ระบบ',
    allowOutsideClick: false,
    allowEscapeKey: false
  }).then(function() {
    _CIV_RedirectToLogin(reason);
  });
}

// ============================================================
// IFRAME CACHE SYSTEM
// ============================================================
var _CIV_FrameMap    = {};
var _CIV_CurrentUrl  = null;
var _CIV_UserData    = null;
var _CIV_SessionId   = null;

function loadPage(fileName, label, elmnt) {
  // 🔐 ตรวจ session ทุกครั้งที่เปลี่ยนหน้า
  if (!_CIV_IsSessionValid(_CIV_GetSession())) {
    _CIV_RedirectToLogin('page_change');
    return;
  }

  var container = document.getElementById('_CIV_FrameContainer');

  if (_CIV_CurrentUrl && _CIV_FrameMap[_CIV_CurrentUrl]) {
    _CIV_FrameMap[_CIV_CurrentUrl].classList.remove('active-frame');
  }

  if (_CIV_FrameMap[fileName]) {
    _CIV_FrameMap[fileName].classList.add('active-frame');
  } else {
    var iframe = document.createElement('iframe');
    iframe.src = fileName;
    iframe.className = 'page-frame active-frame';
    iframe.setAttribute('allowfullscreen', '');
    container.appendChild(iframe);
    _CIV_FrameMap[fileName] = iframe;
  }

  _CIV_CurrentUrl = fileName;

  document.querySelectorAll('.nav-item').forEach(function(n) {
    n.classList.remove('active');
  });
  if (elmnt && elmnt.classList) {
    elmnt.classList.add('active');
  }

  var titleEl = document.getElementById('_CIV_TopbarTitle');
  if (titleEl) titleEl.textContent = label || fileName;

  if (window.innerWidth <= 768) _CIV_CloseMobileSidebar();
}

// compat กับโค้ดเก่า
function openPage(pageName, elmnt) { loadPage(pageName + '.html', pageName, elmnt); }
function _CIV_OpenPage(pageName, elmnt) { loadPage(pageName + '.html', pageName, elmnt); }
function _CIV_OpenPageFromCard(pageName) {
  var navItem = document.querySelector('a[onclick*="\'' + pageName + '\'"]');
  loadPage(pageName + '.html', pageName, navItem);
}

// ============================================================
// Sidebar / Mobile
// ============================================================
function _CIV_ToggleSidebar() {
  if (window.innerWidth <= 768) _CIV_OpenMobileSidebar();
}
function _CIV_OpenMobileSidebar() {
  document.getElementById('_CIV_Sidebar').classList.add('_CIV_open');
}
function _CIV_CloseMobileSidebar() {
  document.getElementById('_CIV_Sidebar').classList.remove('_CIV_open');
}

// ============================================================
// Dark Mode
// ============================================================
function _CIV_ToggleDark(cb) {
  document.body.classList.toggle('dark', cb.checked);
  var icon  = document.getElementById('_CIV_ModeIcon');
  var label = document.getElementById('_CIV_ModeLabel');
  if (cb.checked) {
    if (icon)  icon.className = 'fa fa-sun';
    if (label) label.textContent = 'Light Mode';
  } else {
    if (icon)  icon.className = 'fa fa-moon';
    if (label) label.textContent = 'Dark Mode';
  }
}

// ============================================================
// Search Nav
// ============================================================
function _CIV_FilterNav(q) {
  var q2 = q.trim().toLowerCase();
  document.querySelectorAll('#_CIV_Nav .nav-item').forEach(function(item) {
    var lbl = (item.dataset.label || '').toLowerCase();
    item.style.display = (!q2 || lbl.includes(q2)) ? '' : 'none';
  });
}

// ============================================================
// Logout
// ============================================================
function _CIV_HandleLogout(ev) {
  ev.preventDefault();

  Swal.fire({
    title: 'ออกจากระบบ?',
    text: 'คุณต้องการออกจากระบบใช่หรือไม่',
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#E53935',
    cancelButtonColor: '#d1d5db',
    confirmButtonText: '<i class="fa fa-right-from-bracket"></i> ออกจากระบบ',
    cancelButtonText: 'ยกเลิก',
    reverseButtons: true
  }).then(function(result) {
    if (!result.isConfirmed) return;

    // 🔐 ลบ session ออกทั้งหมด
    try {
      localStorage.removeItem(_CIV_CONFIG.SESSION_KEY);
      localStorage.removeItem('_CIV_currentUser');
      sessionStorage.removeItem('_CIV_CurrentPage');
    } catch(e) {}

    showLogoutPopup(function() {
      window.location.replace(_CIV_CONFIG.LOGIN_PAGE);
    });
  });
}

// ============================================================
// Utility
// ============================================================
function _CIV_GetSessionIdFromUrl() {
  return new URLSearchParams(window.location.search).get('session');
}

function _CIV_LoadAndSaveUserData() {
  if (typeof google !== 'undefined' && google.script && google.script.run) {
    google.script.run
      .withSuccessHandler(function(ud) {
        if (ud && ud.logged_in === 'true') {
          _CIV_UserData = ud;
          try {
            localStorage.setItem('_CIV_currentUser', JSON.stringify(ud));
            var el = document.getElementById('_CIV_UserFullname');
            if (el) el.textContent = ud.fname + ' ' + ud.lname;
          } catch(e) {}
        }
      })
      .withFailureHandler(function(e) { console.error('❌ getCurrentUser:', e); })
      .getCurrentUser(_CIV_SessionId);
  }
}

function _CIV_UpdateDateTime() {
  var el = document.getElementById('_CIV_DateTime');
  if (!el) return;
  var now  = new Date();
  var time = now.toLocaleString('th-TH', { hour:'numeric', minute:'numeric', hour12:true, timeZone:'Asia/Bangkok' });
  var date = now.toLocaleDateString('th-TH', { weekday:'long', month:'long', day:'numeric' }) + ' ' + now.getFullYear();
  el.textContent = time + ' , ' + date;
}
setInterval(_CIV_UpdateDateTime, 60000);

// ============================================================
// 🔐 Init — ตรวจ session ก่อนทำอะไรทั้งนั้น
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
  // ตรวจสอบ session อีกรอบหลัง DOM โหลด (double check)
  var session = _CIV_GetSession();
  if (!_CIV_IsSessionValid(session)) {
    _CIV_RedirectToLogin('dom_ready_check');
    return;
  }

  _CIV_SessionId = _CIV_GetSessionIdFromUrl();
  _CIV_LoadAndSaveUserData();
  _CIV_UpdateDateTime();

  // 🔐 เริ่ม watcher เช็ค session ต่อเนื่อง
  _CIV_StartSessionWatcher();

  // โหลด dashboard เป็นหน้าแรก
  var firstNav = document.querySelector('#_CIV_Nav .nav-item');
  loadPage('dashboard.html', 'รายงาน Dashboard', firstNav);

  window.addEventListener('resize', function() {
    if (window.innerWidth > 768) _CIV_CloseMobileSidebar();
  });

  // 🔐 ตรวจจับเมื่อ tab กลับมา active (กรณีเปิด tab อื่นแล้ว logout)
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') {
      var s = _CIV_GetSession();
      if (!_CIV_IsSessionValid(s)) {
        _CIV_ShowSessionExpiredPopup('tab_focus');
      }
    }
  });
});
</script>

  <script>
    function showLogoutPopup(callback) {
      var overlay = document.getElementById('logoutOverlay');
      var ring    = document.getElementById('logoutRing');
      overlay.classList.add('show');

      var start    = null;
      var duration = 1400;
      function animRing(ts) {
        if (!start) start = ts;
        var progress = Math.min((ts - start) / duration, 1);
        ring.style.setProperty('--lp', Math.round(progress * 100) + '%');
        if (progress < 1) {
          requestAnimationFrame(animRing);
        } else {
          setTimeout(function() {
            overlay.classList.remove('show');
            if (callback) callback();
          }, 200);
        }
      }
      requestAnimationFrame(animRing);
    }
  </script>
